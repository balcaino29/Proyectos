name: Auditoria HE GeoVictoria

on:
  schedule:
    # Ejecuta a las 06:00 AM Chile (09:00 UTC) de Lunes a Viernes
    - cron: '0 9 * * 1-5'
  workflow_dispatch: # Botón para ejecutar manual

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Dependencias
        run: |
          pip install requests pandas openpyxl xlsxwriter

      - name: Ejecutar Script
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_SECRET: ${{ secrets.API_SECRET }}
          CLAVE_APP: ${{ secrets.CLAVE_APP }}
        run: python get_horas_extras.py
